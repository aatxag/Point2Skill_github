# UNet diffusion policy where the contact anchor is injected as part of the
# observation vector (no special architectural branch).
#
# obs_dim=11 (8 qpos + 3 contact_norm) comes from task.obs_dim.
# use_obs="add_token" projects the 11-dim obs through Linear(11 → token_dim)
# and appends it as one extra token to the visual feature sequence.
# The flattened tokens become global_cond for the UNet (FiLM conditioning).

defaults:
  - features: resnet_gn
  - _self_

_target_: data4robotics.models.diffusion_unet.DiffusionUnetAgent
odim: ${task.obs_dim}
n_cams: ${task.n_cams}
use_obs: "add_token"
dropout: 0.1
train_diffusion_steps: 100
eval_diffusion_steps: 16
ac_dim: ${task.ac_dim}
ac_chunk: ${ac_chunk}
imgs_per_cam: ${add:${img_chunk},${len:${task.train_buffer.goal_indexes}}}
share_cam_features: False
early_fusion: False
feat_norm: null

noise_net_kwargs:
  diffusion_step_embed_dim: 256
  down_dims: [256, 512, 1024]
  kernel_size: 3
  n_groups: 8